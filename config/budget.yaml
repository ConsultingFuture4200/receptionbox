# Budget projection per gate. Cost ledger (Plan 02; INFRA-06) refuses
# provisioning when `budget_remaining - projected_cost*safety_factor < 0`.
# Defaults sourced from CLAUDE.md §13 cost estimate table (May 2026).
safety_factor: 1.5

provider_caps:
  runpod: 75.0
  tensorwave: 75.0
  vultr: 75.0

gates:
  smoke:
    projected_cost_per_run_usd: 1.0
    expected_runs: 1
  g1:
    projected_cost_per_run_usd: 2.0
    expected_runs: 5
  g2:
    projected_cost_per_run_usd: 1.5
    expected_runs: 2
  g3:
    projected_cost_per_run_usd: 1.0
    expected_runs: 1
  g5:
    projected_cost_per_run_usd: 1.0
    expected_runs: 2
  g7:
    projected_cost_per_run_usd: 2.0
    expected_runs: 2
  preflight_setup:
    projected_cost_per_run_usd: 7.0
    expected_runs: 1
  canary:
    projected_cost_per_run_usd: 1.0
    expected_runs: 1

# Phase 2 (CUDA pre-flight) operational config (D-18, D-20).
# - max_minutes_per_gate drives the in-instance watchdog (CLOUD-04, D-16);
#   sum is capped at 100 minutes per pre-flight session ($14 budget at
#   $2.69/hr SXM).
# - cache_bootstrap_one_time_usd is the network-volume storage amortization
#   line item for the one-time HF model pull (D-19/D-20).
phase2:
  max_minutes_per_gate:
    smoke: 60       # Plan 02-07: bumped 30 -> 60 to absorb cold first-pull of
                    # the 16 GB v6+ image (vllm + Kokoro venv) onto a fresh
                    # RunPod host. Pod 'zxy4alh5w1x8fd' (2026-05-07) hit the
                    # 30-min ceiling with uptime=0/dockerId=null = container
                    # never came up before driver TIMEOUT. Subsequent pods
                    # pulled to the same host cache run in <2 min.
    g1: 30
    g2: 15
    g3: 10
    g5: 15
    bootstrap: 30   # Plan 02-06: bumped 15 -> 30 to absorb cold first-pull
                    # of the rbox-pod image. Subsequent pulls hit cache.
  # Plan 02-06: bumped 0.67 -> 1.50 to match the new 30-min ceiling at
  # H100 SXM ($2.99/hr × 30 min = $1.495). Typical actual after host-cache
  # warms is still ~$0.50 (10-min run). Ledger authorizes the ceiling.
  cache_bootstrap_one_time_usd: 1.50
