# Budget projection per gate. Cost ledger (Plan 02; INFRA-06) refuses
# provisioning when `budget_remaining - projected_cost*safety_factor < 0`.
# Defaults sourced from CLAUDE.md §13 cost estimate table (May 2026).
safety_factor: 1.5

provider_caps:
  runpod: 75.0
  tensorwave: 75.0
  vultr: 75.0

gates:
  smoke:
    projected_cost_per_run_usd: 1.0
    expected_runs: 1
  g1:
    projected_cost_per_run_usd: 2.0
    expected_runs: 5
  g2:
    projected_cost_per_run_usd: 1.5
    expected_runs: 2
  g3:
    projected_cost_per_run_usd: 1.0
    expected_runs: 1
  g5:
    projected_cost_per_run_usd: 1.0
    expected_runs: 2
  g7:
    projected_cost_per_run_usd: 2.0
    expected_runs: 2
  # Plan 03-05: AUDIT-01 co-residency + AUDIT-03 engine-swap + Ollama
  # overhead. Both run on one v18 H100 pod session (~25-30 min). Budget
  # envelope: ≤ $3.50 against the plan's $3 target.
  audit_01:
    projected_cost_per_run_usd: 0.75
    expected_runs: 1
  audit_03:
    projected_cost_per_run_usd: 2.0
    expected_runs: 1
  preflight_setup:
    projected_cost_per_run_usd: 7.0
    expected_runs: 1
  canary:
    projected_cost_per_run_usd: 1.0
    expected_runs: 1
  # Plan 03-01 (cloud-derate Phase 3): reserved bucket name for harness-audit
  # ledger rows. Note: the 03-01 audit driver currently routes its real-spend
  # provision() call through gate='smoke' because the v18 pod image has no
  # gates.harness_audit.runner module; pod_entrypoint.sh would FATAL on the
  # missing runner. This entry is here so the budget table acknowledges the
  # logical harness-audit allowance, and so any future pod-side audit gate
  # (image v19+) can call authorize_spend(provider='runpod', gate='harness-
  # audit', ...) without further config changes.
  harness-audit:
    projected_cost_per_run_usd: 1.0
    expected_runs: 1

# Phase 2 (CUDA pre-flight) operational config (D-18, D-20).
# - max_minutes_per_gate drives the in-instance watchdog (CLOUD-04, D-16);
#   sum is capped at 100 minutes per pre-flight session ($14 budget at
#   $2.69/hr SXM).
# - cache_bootstrap_one_time_usd is the network-volume storage amortization
#   line item for the one-time HF model pull (D-19/D-20).
phase2:
  max_minutes_per_gate:
    smoke: 60       # Plan 02-07: bumped 30 -> 60 to absorb cold first-pull of
                    # the 16 GB v6+ image (vllm + Kokoro venv) onto a fresh
                    # RunPod host. Pod 'zxy4alh5w1x8fd' (2026-05-07) hit the
                    # 30-min ceiling with uptime=0/dockerId=null = container
                    # never came up before driver TIMEOUT. Subsequent pods
                    # pulled to the same host cache run in <2 min.
    g1: 30
    g2: 15
    g3: 10
    g5: 15
    bootstrap: 30   # Plan 02-06: bumped 15 -> 30 to absorb cold first-pull
                    # of the rbox-pod image. Subsequent pulls hit cache.
  # Plan 02-06: bumped 0.67 -> 1.50 to match the new 30-min ceiling at
  # H100 SXM ($2.99/hr × 30 min = $1.495). Typical actual after host-cache
  # warms is still ~$0.50 (10-min run). Ledger authorizes the ceiling.
  cache_bootstrap_one_time_usd: 1.50

# Phase 3 (ROCm validation) operational config (D-33, D-34).
#
# Spend math (sum of max_minutes_per_gate):
#   120 + 120 + 45 + 20 + 30 + 45 + 30 + 30 = 440 min ≈ 7.3 hr.
# At Vultr $1.85/hr ≈ $13.50 for a full sanity pass (allows ~3 full passes
# within $54 budget). Chatterbox D-1 is the first $4 spend cap; the rest
# gate per-pod via ledger authorization.
phase3:
  provider_default: vultr        # D-31: Vultr is Day-1 provider
  hourly_rate_usd:
    vultr: 1.85                  # CLAUDE.md §1.2 on-demand
    tensorwave: 1.71             # CLAUDE.md §1.2 starting (Dedicated MI300X+)
  max_minutes_per_gate:
    chatterbox_d1: 120           # D-36 2-hr Day-1 timebox
    g1: 120                      # 500-call corpus × N=1/2/4 (three pods)
    g2: 45                       # 200 G.711 dual-path (faster-whisper + ONNX-RT)
    g3: 20                       # silero+turn-detector threshold sweep (12 thresholds)
    g5: 30                       # 200 UPL probes + 50 benign control
    g7: 45                       # 30 stimulus pairs × 2 engines (warm + cold)
    audit_co_residency: 30       # AUDIT-01 5-min sustained + setup/teardown
    audit_op_coverage: 30        # AUDIT-02 op trace (~1 GPU-min/model × 4 models)
  # D-36 spend cap on Chatterbox Day-1 — independent of ledger cap.
  chatterbox_d1_spend_cap_usd: 4.0
  # Total ROCm-rail budget per CLAUDE.md §13 (MI300X subtotal $54).
  rocm_budget_total_usd: 54.0
